{% extends "base.html" %}
{% block page_title %}{% if student %}Edit Student{% else %}Add Student{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{% if student %}Edit Student{% else %}Add Student{% endif %}</h1>
    <p><a href="{{ url_for('students') }}" style="color:#5b6470;text-decoration:none;">← Back to Students</a></p>
  </div>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Student Code</label>
        <input type="text" name="code" value="{{ student.code if student else '' }}" placeholder="S001" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ student.email if student else '' }}" placeholder="student@campus.edu" required>
      </div>
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ student.first_name if student else '' }}" placeholder="First name" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ student.last_name if student else '' }}" placeholder="Last name" required>
      </div>
      <div class="form-group">
        <label>Level</label>
        <select name="level">
          {% for lvl in ['L1','L2','L3','M1','M2'] %}
          <option value="{{ lvl }}" {% if student and student.level == lvl %}selected{% endif %}>{{ lvl }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Speciality</label>
        <input type="text" name="speciality" value="{{ student.speciality if student else '' }}" placeholder="GL, SI, RT…" required>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button type="submit" class="btn btn-primary">{% if student %}Save Changes{% else %}Add Student{% endif %}</button>
      <a href="{{ url_for('students') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
