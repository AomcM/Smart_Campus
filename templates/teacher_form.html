{% extends "base.html" %}
{% block page_title %}{% if teacher %}Edit Teacher{% else %}Add Teacher{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{% if teacher %}Edit Teacher{% else %}Add Teacher{% endif %}</h1>
    <p><a href="{{ url_for('teachers') }}" style="color:#5b6470;text-decoration:none;">← Back to Teachers</a></p>
  </div>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Teacher Code</label>
        <input type="text" name="code" value="{{ teacher.code if teacher else '' }}" placeholder="T001" required>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" value="{{ teacher.department if teacher else '' }}" placeholder="CS, Math, IS…" required>
      </div>
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ teacher.first_name if teacher else '' }}" placeholder="First name" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ teacher.last_name if teacher else '' }}" placeholder="Last name" required>
      </div>
      <div class="form-group full">
        <label>Email</label>
        <input type="email" name="email" value="{{ teacher.email if teacher else '' }}" placeholder="teacher@campus.edu" required>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button type="submit" class="btn btn-primary">{% if teacher %}Save Changes{% else %}Add Teacher{% endif %}</button>
      <a href="{{ url_for('teachers') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
