{% extends "base.html" %}
{% block page_title %}{% if module %}Edit Module{% else %}Add Module{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{% if module %}Edit Module{% else %}Add Module{% endif %}</h1>
    <p><a href="{{ url_for('modules') }}" style="color:#5b6470;text-decoration:none;">← Back to Modules</a></p>
  </div>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Module Code</label>
        <input type="text" name="code" value="{{ module.code if module else '' }}" placeholder="POO" required>
      </div>
      <div class="form-group">
        <label>Credits</label>
        <input type="number" name="credits" value="{{ module.credits if module else 3 }}" min="1" max="10" required>
      </div>
      <div class="form-group full">
        <label>Title</label>
        <input type="text" name="title" value="{{ module.title if module else '' }}" placeholder="Module title…" required>
      </div>
      <div class="form-group">
        <label>Semester</label>
        <select name="semester">
          <option value="1" {% if module and module.semester == 1 %}selected{% endif %}>Semester 1</option>
          <option value="2" {% if module and module.semester == 2 %}selected{% endif %}>Semester 2</option>
        </select>
      </div>
      <div class="form-group">
        <label>Teacher</label>
        <select name="teacher_id">
          <option value="">— None —</option>
          {% for t in teachers %}
          <option value="{{ t.id }}" {% if module and module.teacher_id == t.id %}selected{% endif %}>
            {{ t.first_name }} {{ t.last_name }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button type="submit" class="btn btn-primary">{% if module %}Save Changes{% else %}Add Module{% endif %}</button>
      <a href="{{ url_for('modules') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
